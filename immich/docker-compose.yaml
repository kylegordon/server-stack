---
networks:
  traefik_proxy:
    external: true
    name: traefik_traefik_proxy
  immich:
    driver: bridge

volumes:
  immich_postgres:
    driver: local
    driver_opts:
      type: nfs4
      o: addr=172.24.32.5,rw
      device: ":/srv/nfs4/docker_nfs/immich/postgres/"

  immich_model_cache:
    driver: local
    driver_opts:
      type: nfs4
      o: addr=172.24.32.5,rw
      device: ":/srv/nfs4/docker_nfs/immich/model-cache/"

  immich_library:
    driver: local
    driver_opts:
      type: nfs4
      o: addr=172.24.32.5,rw
      device: ":/srv/nfs4/docker_nfs/immich/library/"

services:
  immich_server:
    image: ghcr.io/immich-app/immich-server:v2.7.5
    container_name: immich_server
    networks:
      - traefik_proxy
      - immich
    volumes:
      - immich_library:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      DB_HOSTNAME: immich_postgres
      REDIS_HOSTNAME: immich_redis
    depends_on:
      immich_redis:
        condition: service_healthy
      immich_postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_traefik_proxy
      - traefik.http.routers.immich-http.entrypoints=web
      - traefik.http.routers.immich-http.rule=Host(`immich.viewpoint.house`)
      - traefik.http.routers.immich-http.middlewares=immich-https
      - traefik.http.middlewares.immich-https.redirectscheme.scheme=https
      - traefik.http.routers.immich.rule=Host(`immich.viewpoint.house`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.routers.immich.tls=true
      - traefik.http.routers.immich.tls.certresolver=letsencrypt
      - traefik.http.services.immich.loadbalancer.server.port=2283
      - traefik.http.services.immich.loadbalancer.healthcheck.port=2283
      - traefik.http.services.immich.loadbalancer.healthcheck.path=/api/server/ping
      - homepage.group=Media
      - homepage.name=Immich
      - homepage.icon=mdi-image-multiple
      - homepage.href=https://immich.viewpoint.house
      - homepage.description=Self-hosted photo and video backup
      - com.centurylinklabs.watchtower.enable=true

  immich_machine_learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    container_name: immich_machine_learning
    networks:
      - immich
    volumes:
      - immich_model_cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=true

  immich_redis:
    image: docker.io/valkey/valkey:9
    container_name: immich_redis
    networks:
      - immich
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=true

  immich_postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    networks:
      - immich
    volumes:
      - immich_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=true
