---
version: '3'

# In order to set configuration, please use a .env file in
# your compose project directory (the same directory as your
# docker-compose.yml), and set database options, application
# name, key, and other settings there.
# A list of available settings is available in .env.example
#
# The services should scale properly across a swarm cluster
# if the volumes are properly shared between cluster members.

services:
## App and Worker
  app:
    # Comment to use dockerhub image
    image: zknt/pixelfed:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - app-storage:/var/www/storage
      - app-bootstrap:/var/www/bootstrap
      - "./.env.docker:/var/www/.env"
    networks:
      - traefik_proxy
      - pixelfed
    # ports:
    #   - "8080:80"
    depends_on:
      - db
      - redis
    labels:
      # traefik
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      # traefikv2
      - "traefik.http.routers.pixelfed.rule=Host(`pixelfed.glasgownet.com`)"
      - "traefik.http.routers.pixelfed.entrypoints=https"
      - "traefik.http.services.pixelfed.loadbalancer.server.port=80"

  worker:
    image: zknt/pixelfed:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - app-storage:/var/www/storage
      - app-bootstrap:/var/www/bootstrap
    networks:
      - traefik_proxy
      - pixelfed
    command: gosu www-data php artisan horizon
    depends_on:
      - db
      - redis

## DB and Cache
  db:
    image: mariadb:jammy
    restart: unless-stopped
    networks:
      - pixelfed
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env.docker
    volumes:
      - "db-data:/var/lib/mysql"

  redis:
    image: redis:5-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - "redis-data:/data"
    networks:
      - pixelfed

volumes:
  db-data:
  redis-data:
  app-storage:
  app-bootstrap:

networks:
  internal:
    internal: true
  external:
    driver: bridge
  pixelfed:
    internal: true
  traefik_proxy:
    external: true
    name: frontend_traefik_proxy