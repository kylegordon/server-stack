##############################################
# Komodo Resource Sync - Stack Definitions   #
##############################################
#
# This file declares all Docker Compose stacks managed by Komodo.
# It is intended for use with a Komodo ResourceSync pointing at:
#   repo = "kylegordon/server-stack"
#   resource_path = ["komodo-stacks.toml"]
#
# Servers referenced here must be added to Komodo before syncing:
#   homeauto   - 172.24.32.13  (primary, runs Komodo Core)
#   adsb       - 172.24.32.11  (ADS-B receiver)
#   octoprint  - 172.24.32.18  (OctoPrint host)
#   blackbird  - 172.24.32.5   (NFS storage server)
#   littlegeek - 100.92.153.11 (secondary/laptop)
#   deepcore   - 100.98.130.51 (public-facing server)
#
# Stack config reference:
#   https://docs.rs/komodo_client/latest/komodo_client/entities/stack/struct.StackConfig.html
#

##############################################
# homeauto (172.24.32.13)                    #
##############################################

[[stack]]
name = "core-stack"
tags = ["homeauto", "infrastructure"]
deploy = false
[stack.config]
