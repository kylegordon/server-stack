---
name: Validate Docker Compose Files

on: [push, pull_request]

jobs:
  validate:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create stub env files
        run: |
          # Create an empty .env in every directory that contains a compose file so
          # that "env_file not found" errors (gitignored secrets) don't block validation.
          find . -name "docker-compose*.yaml" -print0 \
            | xargs -0 -I{} dirname {} \
            | sort -u \
            | while read -r dir; do
                touch "$dir/.env"
              done

          # Also stub any explicit env_file paths declared in each compose file,
          # resolved relative to that file's directory so paths are always correct.
          find . -name "docker-compose*.yaml" | sort | while IFS= read -r f; do
            dir=$(dirname "$f")
            while IFS= read -r envfile; do
              target="$dir/$envfile"
              [ -f "$target" ] || { mkdir -p "$(dirname "$target")"; touch "$target"; }
            done < <(python3 - "$f" <<'PYEOF'
import sys, yaml
with open(sys.argv[1]) as fh:
    try:
        data = yaml.safe_load(fh)
    except yaml.YAMLError:
        sys.exit(0)
if not isinstance(data, dict):
    sys.exit(0)
for svc in (data.get("services") or {}).values():
    if not isinstance(svc, dict):
        continue
    ef = svc.get("env_file")
    if ef is None:
        continue
    if isinstance(ef, str):
        ef = [ef]
    for item in ef:
        if isinstance(item, str):
            print(item)
        elif isinstance(item, dict) and item.get("path"):
            print(item["path"])
PYEOF
            )
          done

      - name: Validate all Docker Compose files
        run: |
          set +e

          FAILED=0

          # Errors that are acceptable: they reflect missing *runtime* resources
          # (external networks/volumes, missing included files) rather than structural
          # problems with the compose YAML itself.
          RUNTIME_ONLY_PATTERN="undefined (network|volume)|no such file or directory|open .*: no such file"

          validate_file() {
            local f="$1"
            local output
            local rc

            output=$(docker compose -f "$f" config --quiet 2>&1)
            rc=$?

            if [ "$rc" -eq 0 ]; then
              echo "✅  $f"
              return 0
            fi

            # Strip pure warnings (unset variables etc.) from the output so we can
            # judge whether what remains is a real structural error.
            local real_errors
            real_errors=$(
              echo "$output" \
                | grep -vE '^(WARN|warn)\b' \
                | grep -vE '^time=.*level=warning' \
                | grep -vE "$RUNTIME_ONLY_PATTERN"
            )

            if [ -n "$real_errors" ]; then
              echo "❌  $f"
              echo "$real_errors" | sed 's/^/    /'
              return 1
            else
              echo "⚠️   $f  (missing runtime resources — OK in CI)"
              return 0
            fi
          }

          while IFS= read -r f; do
            validate_file "$f" || FAILED=$((FAILED + 1))
          done < <(find . -name "docker-compose*.yaml" | sort)

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED compose file(s) have structural errors — see above."
            exit 1
          else
            echo "All compose files passed structural validation."
          fi
