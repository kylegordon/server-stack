---
include:
  - ../common/networks.yaml

networks:
  homeautomation:
    external: true
    name: homeautomation

services:
  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.9.0
    container_name: ha-mcp-server
    environment:
      - HOMEASSISTANT_URL=https://viewpoint.house
      - HOMEASSISTANT_TOKEN=${HA_TOKEN}
      # Optional: Configure backup hint behavior
      - BACKUP_HINT=normal
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - homepage.group=Home Automation
      - homepage.name=HA MCP
      - homepage.href=https://ha-mcp.viewpoint.house
      - homepage.icon=mdi-home-assistant
      - homepage.description=Home Assistant API Proxy for AI/LLM integration
      - traefik.enable=true
      - traefik.docker.network=traefik_traefik_proxy
      - traefik.http.routers.ha-mcp.entrypoints=websecure
      - traefik.http.routers.ha-mcp.rule=Host(`ha-mcp.viewpoint.house`)
      - traefik.http.routers.ha-mcp.tls=true
      - traefik.http.routers.ha-mcp.tls.certresolver=letsencrypt
      - traefik.http.services.ha-mcp.loadbalancer.server.port=8086
    networks:
      - homeautomation
      - traefik_proxy

# Usage:
# 1. Create .env file: HA_TOKEN=your_long_lived_access_token
# 2. Add ha-mcp service to your docker-compose.yml
# 3. Run: docker-compose up -d ha-mcp
# 4. Connect your MCP client to the ha-mcp container
#
# Get a Home Assistant token:
# Profile → Long-Lived Access Tokens → Create Token
